services:
  postgres:
    image: postgres:16
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./config/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./config/init-engine2.sh:/docker-entrypoint-initdb.d/02-init-engine2.sh:ro
    secrets:
      - db_user
      - db_name
      - db_password
    environment:
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_DB_FILE: /run/secrets/db_name
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    ports:
      - "9506:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $(cat /run/secrets/db_user) -d $(cat /run/secrets/db_name)"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2.10
    ports:
      - "9502:4222"    # NATS client
      - "9501:8222"    # NATS monitoring
    command: --config /etc/nats/nats-server.conf
    volumes:
      - ./config/nats-server.conf:/etc/nats/nats-server.conf:ro

  iris-engine2:
    build:
      context: ./iris-engine2
      target: runtime
      args:
        EYED_MODE: ${EYED_MODE:-prod}
    ports:
      - "9510:7000"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      smpc-party-1:
        condition: service_started
      smpc-party-2:
        condition: service_started
      smpc-party-3:
        condition: service_started
    secrets:
      - db_user
      - db_name_engine2
      - db_password
    volumes:
      - ./models:/src/models:ro
    environment:
      EYED_DB_USER_FILE: /run/secrets/db_user
      EYED_DB_NAME_FILE: /run/secrets/db_name_engine2
      EYED_DB_PASSWORD_FILE: /run/secrets/db_password
      EYED_DB_URL: postgresql://__DB_USER__:__DB_PASSWORD__@postgres:5432/__DB_NAME__
      EYED_MODE: ${EYED_MODE:-prod}
      EYED_PIPELINE_CONFIG: /src/libiris/pipeline.yaml
      EYED_SMPC_ENABLED: "true"
      EYED_SMPC_MODE: ${EYED_SMPC_MODE:-distributed}
      EYED_NATS_URL: nats://nats:4222
      EYED_SMPC_NUM_PARTIES: "3"
      EYED_SMPC_PIPELINE_DEPTH: ${EYED_SMPC_PIPELINE_DEPTH:-0}
      EYED_SMPC_SHARDS_PER_PARTICIPANT: ${EYED_SMPC_SHARDS_PER_PARTICIPANT:-0}
      EYED_TLS_CERT_DIR: ${EYED_TLS_CERT_DIR:-}
      EYED_AUDIT_LOG_PATH: ${EYED_AUDIT_LOG_PATH:-}
      EYED_SECURITY_MONITOR: ${EYED_SECURITY_MONITOR:-false}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7000/health/ready | grep -q ready"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 120s

  smpc-party-1:
    build:
      context: ./iris-engine2
      dockerfile: smpc-party/Dockerfile
    depends_on:
      - nats
    environment:
      PARTY_ID: "1"
      NATS_URL: nats://nats:4222
      NATS_SUBJECT_PREFIX: smpc
      SHARD_ID: ${SMPC_SHARD_ID_1:-0}
      TOTAL_SHARDS: ${SMPC_TOTAL_SHARDS:-0}
      TLS_CERT_DIR: ${SMPC_TLS_CERT_DIR:-}
    restart: unless-stopped

  smpc-party-2:
    build:
      context: ./iris-engine2
      dockerfile: smpc-party/Dockerfile
    depends_on:
      - nats
    environment:
      PARTY_ID: "2"
      NATS_URL: nats://nats:4222
      NATS_SUBJECT_PREFIX: smpc
      SHARD_ID: ${SMPC_SHARD_ID_2:-0}
      TOTAL_SHARDS: ${SMPC_TOTAL_SHARDS:-0}
      TLS_CERT_DIR: ${SMPC_TLS_CERT_DIR:-}
    restart: unless-stopped

  smpc-party-3:
    build:
      context: ./iris-engine2
      dockerfile: smpc-party/Dockerfile
    depends_on:
      - nats
    environment:
      PARTY_ID: "3"
      NATS_URL: nats://nats:4222
      NATS_SUBJECT_PREFIX: smpc
      SHARD_ID: ${SMPC_SHARD_ID_3:-0}
      TOTAL_SHARDS: ${SMPC_TOTAL_SHARDS:-0}
      TLS_CERT_DIR: ${SMPC_TLS_CERT_DIR:-}
    restart: unless-stopped

  key-service:
    build:
      context: .
      dockerfile: key-service/Dockerfile
      additional_contexts:
        openfhe-src: ./3rd-party/openfhe_1-4-2/openfhe-development
    depends_on:
      - nats
    environment:
      EYED_MODE: ${EYED_MODE:-prod}
      EYED_NATS_URL: nats://nats:4222
      EYED_HE_KEY_DIR: /keys
      EYED_LOG_LEVEL: info
    volumes:
      - he-keys:/keys    # Persistent HE key storage

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "9503:50051"   # gRPC (capture devices)
      - "9504:8080"    # HTTP health (+ future WebSocket)
    depends_on:
      - nats
    environment:
      EYED_MODE: ${EYED_MODE:-prod}
      EYED_NATS_URL: nats://nats:4222
      EYED_LOG_LEVEL: info

  capture-device:
    build:
      context: .
      dockerfile: capture/Dockerfile
    profiles: [capture]          # Only start with: docker compose --profile capture up -d
    depends_on:
      - gateway
    volumes:
      - ./data:/data:ro
    environment:
      EYED_MODE: ${EYED_MODE:-prod}
      EYED_GATEWAY_ADDR: gateway:50051
      EYED_DEVICE_ID: capture-01
      EYED_LOG_LEVEL: info
      EYED_IMAGE_DIR: /data/Iris/CASIA1
      EYED_QUALITY_THRESHOLD: "0.05"
    restart: unless-stopped

  storage:
    build:
      context: .
      dockerfile: storage/Dockerfile
    ports:
      - "9507:8082"    # HTTP health
    depends_on:
      - nats
    volumes:
      - archive-data:/data/archive
    environment:
      EYED_MODE: ${EYED_MODE:-prod}
      EYED_NATS_URL: nats://nats:4222
      EYED_ARCHIVE_ROOT: /data/archive
      EYED_LOG_LEVEL: info

  client2:
    build:
      context: ./client2
      args:
        EYED_MODE: ${EYED_MODE:-prod}
    ports:
      - "9505:80"
    depends_on:
      - gateway
      - iris-engine2

  integration-test:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    profiles: [test]
    depends_on:
      gateway:
        condition: service_started
      iris-engine2:
        condition: service_healthy
    volumes:
      - ./data:/data:ro
    entrypoint: /app/integration_test
    command:
      - gateway
      - "50051"

  vnv:
    build:
      context: ./scripts/vnv
    profiles: [vnv]
    depends_on:
      iris-engine2:
        condition: service_healthy
    volumes:
      - ./data:/data:ro
      - ./reports:/reports
    environment:
      VNV_API_URL: http://iris-engine2:7000
      VNV_DATASET: /data/Iris/CASIA-Iris-Thousand
      VNV_OUTPUT: /reports/vnv/
    entrypoint: ["python"]

secrets:
  db_user:
    file: ./secrets/db_user.txt
  db_name:
    file: ./secrets/db_name.txt
  db_name_engine2:
    file: ./secrets/db_name_engine2.txt
  db_password:
    file: ./secrets/db_password.txt

volumes:
  pgdata:
  archive-data:
  he-keys:
