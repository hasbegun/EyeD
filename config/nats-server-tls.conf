# NATS server configuration — with mTLS enabled
# Use this config when EYED_TLS_CERT_DIR is set.
# Certificates generated by: iris-engine2/scripts/gen-certs.sh

listen: 0.0.0.0:4222
http: 0.0.0.0:8222

max_payload: 8MB
write_deadline: 30s

tls {
    cert_file:  /certs/nats-server.crt
    key_file:   /certs/nats-server.key
    ca_file:    /certs/ca.crt
    verify:     true          # Require client certificates (mTLS)
    timeout:    5
}
