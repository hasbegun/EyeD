# Dev overlay — overrides the db_name_engine2 secret to use eyed_dev database.
# Usage (via Makefile): make up-dev
# Direct: EYED_MODE=dev docker compose -f docker-compose.yml -f docker-compose.dev.yml up

secrets:
  db_name_engine2:
    file: ./secrets/db_name_engine2_dev.txt

services:
  iris-engine2:
    build:
      args:
        EYED_MODE: dev
    environment:
      EYED_MODE: dev
      EYED_ALLOW_PLAINTEXT: "true"

  client2:
    build:
      args:
        EYED_MODE: dev